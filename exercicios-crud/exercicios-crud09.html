<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/exercicio-crud09.css">
    <title>Document</title>
</head>
<body>
    <h1>Biblioteca Online</h1>

    <div>
        <label for="campo-titulo">Titulo do Livro</label>
        <input type="text" id="campo-titulo">

        <label for="campo-autor">Autor</label>
        <input type="text" id="campo-autor">

        <label for="campo-paginas">Quantidade de Paginas</label>
        <input type="number" id="campo-paginas">

        <label for="campo-ano">Ano de Publicação</label>
        <input type="number" id="campo-ano">
    </div>
    <button id="salvar">Salvar</button>

    <table>
        <thead>
            <tr>
                <th>Codigo</th>
                <th>Titulo</th>
                <th>Autor</th>
                <th>Quant. Paginas</th>
                <th>Ano de Publicação</th>
                <th>Classificação</th>
            </tr>
        </thead>
        <tbody id="lista-livros">
        </tbody>
    </table>

    <script src="../assets/js/exercicios-crud09.js"></script>
</body>
</html>
