<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/exercicio-crud13.css">
    <title>Cadastro de Viagens</title>
</head>
<body>

<h1>Cadastro de Viagens</h1>

<div>
    <label>Destino</label>
    <input type="text" id="campo-destino">

    <label>Distância (km)</label>
    <input type="number" id="campo-distancia">

    <label>Quantidade de passageiros</label>
    <input type="number" id="campo-passageiros">

    <label>Valor da passagem</label>
    <input type="number" id="campo-valor">
</div>

<button id="botao-salvar">Salvar</button>

<table>
    <thead>
        <tr>
            <th>Código</th>
            <th>Destino</th>
            <th>Distância</th>
            <th>Passageiros</th>
            <th>Valor</th>
            <th>Total Arrecadado</th>
        </tr>
    </thead>
    <tbody id="lista-viagens"></tbody>
</table>

<script src="../assets/js/exercicios-crud13.js"></script>

</body>
</html>
