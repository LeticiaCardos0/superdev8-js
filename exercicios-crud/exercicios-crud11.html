<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/exercicio-crud11.css">
    <title>Document</title>
</head>
<body>
    <h1>Cadastro de Filmes</h1>
    
    <div>
        <label for="campo-nome">Nome Filme</label>
        <input type="text" id="campo-nome">

        <label for="campo-genero">Genero do Filme</label>
        <select id="campo-genero">
            <option value="" selected disabled>Selecione</option>
            <option value="acao">Ação</option>
            <option value="comedia">Comedia</option>
            <option value="drama">Drama</option>
            <option value="romance">Romance</option>
            <option value="terro">Terror</option>
        </select>

        <label for="campo-duracao">Duração em Minutos</label>
        <input type="number" id="campo-ducarao">

        <label for="campo-faixa">Faixa Etária(digite somente a idade)</label>
        <input type="number" id="campo-faixa">
    </div>
    <button id="botao-salvar">Salvar</button>

</body>
</html>
