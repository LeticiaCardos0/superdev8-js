<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/exercicio-crud01.css">
    <title>Document</title>
</head>
<body>
    <h1>Conversor de moedas</h1>
    <h3>Digite o calor em reais e escolha qual moeda deseja realizar a conversão</h3>

    <div>
        <label for="campo-valor">Valor R$</label>
        <input type="number" id="campo-valor">
    </div>

    <span>Selecione a moeda que deseja converter</span>

    <div>
        <button id="botao-converter-usd">USD</button>
        <button id="botao-converter-eur">EUR</button>
        <button id="botao-converter-gbp">GBP</button>
        <button id="botao-converter-cad">CAD</button>
        <button id="botao-converter-jpy">JPY</button>
        <button id="botao-converter-ars">ARS</button>
        <button id="botao-converter-chf">CHF</button>
        <button id="botao-converter-cny">CNY</button>
    </div>

    <ul id="conversoes">
    </ul>

    <script src="../assets/js/exercicios-crud01.js"></script>
</body>
</html>
