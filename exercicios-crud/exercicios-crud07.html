<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/exercicio-crud07.css">
    <title>Document</title>
</head>
<body>
    <h1>Cadastro de Alunos</h1>

    <div>
        <label for="campo-nome">Nome Aluno</label>
        <input type="text" id="campo-nome">

        <label for="campo-nota1">Informe a Primeira Nota</label>
        <input type="number" id="campo-nota1">
    
        <label for="campo-nota2">Informe a Segunda Nota</label>
        <input type="number" id="campo-nota2">
        
        <label for="campo-nota3">Informe a Terceira Nota</label>
        <input type="number" id="campo-nota3">
    </div>
    <button id="calcular-media">Calcular media</button>
    
    <table>
        <thead>
            <tr>
                <th>Codigo</th>
                <th>Nome Aluno</th>
                <th>Nota 1</th>
                <th>Nota 2</th>
                <th>Nota 3</th>
                <th>Media Aluno</th>
                <th>Situação</th>
            </tr>
        </thead>
        <tbody id="resumo-alunos">
        </tbody>
    </table>

    <script src="../assets/js/exercicios-crud07.js"></script>
</body>
</html>
