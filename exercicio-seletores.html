<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/exercicio-seletores.css">
</head>
<body>

    
    
    
    <h1>Cadastro</h1>
        <label for="campo-nome">Digite seu nome</label>
        <input type="text" id="campo-nome">
        <div>
            <button class="butao" id="tipo-cadastro-pf">Realizar cadastro como pessoa Fisica</button>
            <button id="tipo-cadastro-pj">Realizar cadastro como pessoa Juridica</button>
        </div>

        <div id="tipo-pf">
            <label for="campo-cpf">Digite seu CPF</label>
            <input type="number" id="campo-cpf">
            
            <label for="campo-rg">Digite seu RG</label>
            <input type="number" id="campo-rg">
            
            <label for="campo-data-nascimento">Digite sua data de nascimento</label>
            <input type="date" id="campo-data-nascimento">
        </div>
        
        <div id="tipo-pj">
            <label for="campo-cnpj">Digite seu CNPJ</label>
            <input type="number" id="campo-cnpj">
            
            <label for="campo-razao-social">Digite sua razão social</label>
            <input type="text" id="campo-razao-social">
        </div>

    
    <script src="assets/js/exercicio-seletores.js"></script>
</body>
</html>
